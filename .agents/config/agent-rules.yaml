# ─── Synced Sources (managed by /skill-sync) ───────────────────────────
# Subprojects, submodules, and external directories that use the same
# agent-rules template framework. Their instructions become available
# as /scope-{name}-{command} scoped commands.
synced_sources: []
  # - name: "backend"                    # Scoped command prefix
  #   path: "./services/backend"         # Relative or absolute path
  #   type: "submodule"                  # submodule | nested_repo | external
  #   project_name: "backend-api"        # From source's agent-rules.yaml
  #   version: "0.1.2"                   # Source's effective version
  #   last_synced: "2026-03-08"
  #   commands:                          # Discovered scoped commands
  #     - name: "skill"
  #       file: ".agents/skills/backend-api/SKILL.md"
  #     - name: "instructions"
  #       file: ".github/copilot-instructions.md"
  #     - name: "implement"
  #       file: ".agents/implement.md"
  #     - name: "pitfalls"
  #       files:
  #         - ".agents/pitfalls.md"
  #         - ".agents/pitfalls-live.md"

# ─── Caveman Compression ───────────────────────────────────────────────
# Token-efficient compression for agent instruction files.
# See .agents/skills/caveman/SKILL.md for full documentation.
caveman:
  default_level: full              # lite | full | ultra
  model: claude-sonnet-4.6         # Model used for compression sub-agents
  default_targets:                 # Auto-recursed when /caveman invoked without paths
    - .agents/knowledge/
    - .agents/pitfalls.md
    - .agents/pitfalls-live.md
  explicit_targets:                # Only processed when explicitly named
    - .agents/skills/
  exclude_globs:                   # Always skipped
    - "**/CHANGELOG.md"
    - "**/LICENSE*"
    - "**/.caveman-state.json"

# ─── Discovered Context (auto-populated by /skill-discover) ────────────
discovered:
  last_scan_date: ""
  repo_summary: ""
  file_patterns: []                  # e.g., ["src/**/*.rs", "lib/**/*.rs"]
  test_patterns: []                  # e.g., ["tests/**/*.rs", "src/**/*_test.rs"]
  entry_points: []                   # e.g., ["src/main.rs"]
  existing_ci: ""                    # e.g., "GitHub Actions", "Jenkins"
  toolchain: ""                      # e.g., "rustup 1.27, cargo 1.80"
