# Agent Rules Configuration
# ─────────────────────────────────────────────────────────────────────────
# Generated by /skill-init, refined by /skill-discover.
# All {{PLACEHOLDER}} values in template files resolve from this config.
# Manual edits welcome — bump version.custom when you do.
#
# Effective version: {version.template}.{version.custom}

# ─── Template Versioning ───────────────────────────────────────────────
version:
  template: "0.1"          # From agent-rules template repo (major.minor)
  custom: 0                # Local adjustment counter (bump after /skill-discover or manual edits)

# ─── Project Identity ──────────────────────────────────────────────────
project:
  name: "j2534-logger"
  description: "Windows proxy DLL that sits between a real J2534 device and a client for monitoring events and logging PassThru API calls"
  language: "C++"
  file_extension: ".cpp"
  status: "Active development"

# ─── Directory Layout ──────────────────────────────────────────────────
paths:
  project_root: "."
  source_root: "."                   # Per-component directories at root level
  test_root: ""                      # No test directory
  docs_dir: "docs"                   # Documentation directory
  tmp_dir: "tmp"                     # Scratch directory (must be gitignored)

# ─── Build, Test, Debug ────────────────────────────────────────────────
commands:
  build: "msbuild \"J2534 PassThru Logger.sln\" /p:Configuration=Release"
  test: ""                           # No test suite
  lint: ""                           # No linter configured
  format: ""                         # No formatter configured

# Verification steps run after each task (ordered)
verification:
  - name: "build"
    command: "msbuild \"J2534 PassThru Logger.sln\" /p:Configuration=Release"
    required: true
  - name: "lint"
    command: ""
    required: false

# ─── Debugging Workflows ───────────────────────────────────────────────
# Describe project-specific debugging patterns agents should know.
# /skill-discover populates these by analyzing the repo.
debugging:
  overview: ""                       # General debugging approach
  recipes: []
  # - name: "Quick crash diagnosis"
  #   description: "How to diagnose crashes"
  #   command: "lldb -b -o 'run ...' -- ./binary"
  #   notes: "Use </dev/null to prevent stdin blocking"
  # - name: "Two-stage build verification"
  #   description: "Verify self-hosted builds match"
  #   command: "bash build.sh && STAGE=self bash build.sh"
  #   notes: "Why this matters..."
  crash_patterns: []
  # - symptom: "Segfault in strlen with large address"
  #   likely_cause: "i64 value treated as string pointer"
  #   diagnosis: "Check type propagation in codegen"

# ─── Code Quality Limits ───────────────────────────────────────────────
limits:
  target_loc: 500                    # Target LOC per source file
  max_loc: 700                       # Hard maximum LOC per file
  max_file_depth: 2                  # Max directory nesting under source_root

# ─── AI Model Configuration ───────────────────────────────────────────
models:
  worker_primary: "claude-opus-4.6"
  worker_secondary: "gpt-5.4"
  review_primary: "gpt-5.4"           # Pattern/consistency checks
  review_secondary: "claude-opus-4.6"  # Deep semantic analysis
  orchestrator: "claude-opus-4.6"

# ─── Review Configuration ──────────────────────────────────────────────
review:
  dual_review: true                  # Two independent reviews from different model families
                                     # Set false for single-reviewer mode (uses review_primary only)

  # Verdict merge rules (when dual_review: true)
  # both_approved           → commit with dual sign-off
  # one_requests_changes    → address feedback, re-review with blocking model only
  # both_request_changes    → address combined feedback, re-review with both
  # one_rejects             → escalate to human (fundamental disagreement)

# ─── Escalation Thresholds ─────────────────────────────────────────────
escalation:
  phase1_max_iterations: 5           # Same-model retries before switching models
  phase2_max_iterations: 3           # Switched-model retries before fresh worker
  phase3_max_iterations: 8           # Fresh worker total (phase1+phase2) before marking failed
  max_parallel_workers: 2            # Max concurrent worker agents

# ─── Git Conventions ───────────────────────────────────────────────────
git:
  commit_prefix: ""                  # e.g., "feat:", "stage2/mN:", or "" (none)
  milestone_tag_pattern: ""          # e.g., "v{N}", "stage2-m{N}", "milestone-{N}"
  commit_trailer: |
    Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
  review_signoff: true               # Include "Reviewed-by:" lines in commits

# ─── Coding Conventions ────────────────────────────────────────────────
# Project-specific standards that all agents must follow.
conventions:
  naming:
    functions: "camelCase"
    types: "PascalCase"
    constants: "SCREAMING_SNAKE_CASE"
    modules: "PascalCase"
  error_handling: "Return J2534 error codes (STATUS_NOERROR, ERR_*). Log errors before returning."
  testing: ""                        # No test framework
  comments: "Explain 'why' not 'what', minimal comments"

# ─── Prohibited Actions ────────────────────────────────────────────────
prohibited:
  - "Never commit the tmp/ directory"
  - "Never skip the review step"
  # Add project-specific prohibitions here

# ─── Architecture (populated by /skill-discover) ───────────────────────
architecture:
  overview: ""                       # How the project is organized, pipeline/data flow
  pipeline: ""                       # Processing pipeline diagram (if applicable)
  key_files: []
  # - path: "src/main.rs"
  #   description: "Entry point, CLI argument parsing"
  # - path: "src/parser/mod.rs"
  #   description: "Parser module — AST construction"
  module_boundaries: ""              # How modules interact, what's public API vs internal

